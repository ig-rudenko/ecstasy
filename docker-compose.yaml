x-ecstasy-image: &ecstasy-image ecstasy:20.0.9
x-ecstasy-frontend-image: &ecstasy-frontend-image ecstasy-frontend:20.0.9
x-logging: &logging
  options:
    max-size: "10m"
    max-file: "3"

volumes:
  redis-data:

services:

  frontend:
    image: *ecstasy-frontend-image
    logging: *logging
    build: frontend_v
    restart: unless-stopped
    ports:
      - "${WEB_BIND:-127.0.0.1}:${WEB_PORT:-8000}:80"
    volumes:
      - "./static:/usr/share/nginx/static"
      - "./nginx/default.conf:/etc/nginx/conf.d/default.conf"
    depends_on:
      - backend
    networks:
      - frontend

  backend:
    build: .
    image: *ecstasy-image
    logging: *logging
    restart: unless-stopped
    command: /bin/sh /app/run.sh
    env_file:
      - .env
    environment:
      DJANGO_ENV: "${DJANGO_ENV:-prod}"
      CONFIG_STORAGE_DIR: "/configurations"

    volumes:
      - "./logs:/app/logs"
      - "./static:/app/static"
      - "./media:/app/media"
      - "./map_layer_files:/app/media/map_layer_files"
      - "./configurations:/configurations"
      - "./db-backup:/app/db-backup"
      - "./ssh_data:/app/.ssh"

    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - frontend
      - backend

  celery: &celery
    build: .
    image: *ecstasy-image
    logging: *logging
    restart: unless-stopped
    command: celery -A ecstasy_project worker -l INFO -c 4 -n worker1
    env_file:
      - .env
    environment:
      DJANGO_ENV: "${DJANGO_ENV:-prod}"
      CONFIG_STORAGE_DIR: "/configurations"
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    volumes:
      - "./logs:/app/logs"
      - "./media:/app/media"
      - "./map_layer_files:/app/media/map_layer_files"
      - "./configurations:/configurations"
      - "./ssh_data:/app/.ssh"
    networks:
      - backend

  celery-beat:
    <<: *celery
    command: celery -A ecstasy_project beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler

  device-connector:
    build: .
    image: *ecstasy-image
    logging: *logging
    command: "gunicorn -b ${DEVICE_CONNECTOR_BIND_HOST:-0.0.0.0}:${DEVICE_CONNECTOR_BIND_PORT:-8000} device_connector:app -k gthread -w 1 --keep-alive 180 --threads 200 --no-control-socket"
    restart: unless-stopped
    environment:
      DEVICE_CONNECTOR_TOKEN: "${DEVICE_CONNECTOR_TOKEN:?set DEVICE_CONNECTOR_TOKEN}"

      # Кол-во одновременных подключений к оборудованию по умолчанию.
      DEFAULT_POOL_SIZE: "${DEFAULT_POOL_SIZE:-3}"
      # Максимальное кол-во одновременных подключений к оборудованию.
      MAX_POOL_SIZE: "${MAX_POOL_SIZE:-3}"

      DEVICE_CONNECTOR_LOG_LEVEL: "${DEVICE_CONNECTOR_LOG_LEVEL:-INFO}"
      DEVICE_CONNECTOR_BIND_HOST: "${DEVICE_CONNECTOR_BIND_HOST:-0.0.0.0}"
      DEVICE_CONNECTOR_BIND_PORT: "${DEVICE_CONNECTOR_BIND_PORT:-8000}"
      DEVICE_CONNECTOR_AUTO_ACCEPT_CHANGED_SSH_HOST_KEY: "${DEVICE_CONNECTOR_AUTO_ACCEPT_CHANGED_SSH_HOST_KEY:-0}"
    volumes:
      - "./ssh_data:/app/.ssh"
    networks:
      - backend

  redis:
    image: redis:8.6.3-alpine
    restart: unless-stopped
    logging: *logging
    volumes:
      - "redis-data:/data"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      timeout: 20s
      retries: 10
    networks:
      - backend

  mysql:
    image: mysql:9.7.1-oracle
    command: --max-connections=300
    logging: *logging
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}"
      MYSQL_USER: "${MYSQL_USER:?set MYSQL_USER}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:?set MYSQL_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:?set MYSQL_DATABASE}"
    restart: unless-stopped
    volumes:
      - "./mysql_data:/var/lib/mysql"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10
    networks:
      - backend


networks:
  frontend:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-fron-ecstasy
    enable_ipv6: true
    ipam:
      driver: default
      config:
        - subnet: ${FRONTEND_IPV4_NETWORK:-172.22.253.0/24}
        - subnet: ${FRONTEND_IPV6_NETWORK:-fd4d:6169:6c63:6f76::/64}

  backend:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-back-ecstasy
    enable_ipv6: true
    ipam:
      driver: default
      config:
        - subnet: ${BACKEND_IPV4_NETWORK:-172.22.254.0/24}
        - subnet: ${BACKEND_IPV6_NETWORK:-fd4d:6169:6c63:6f77::/64}
